services:
  - type: web
    name: youtube-downloader
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      apt-get update
      apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
